services:
  db:
    image: postgres:15-alpine
    container_name: optisaas-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: optisaas
    ports:
      - "5435:5432"
    volumes:
      - pgdata_fresh:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optisaas-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:mypassword@db:5432/optisaas?schema=public"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "optisaas"
      MINIO_USE_SSL: "false"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
      WATCHPACK_POLLING: "true"
      WEBPACK_WATCH_OPTIONS_POLL: "500"
      FAST_REFRESH: "true"
      NG_CLI_ANALYTICS: "false"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma generate && npm run start:dev"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: optisaas-frontend
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
      WEBPACK_WATCH_OPTIONS_POLL: "1000"
      NG_CLI_ANALYTICS: "false"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  minio:
    image: minio/minio:latest
    container_name: optisaas-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"

  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optisaas-prisma-studio
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: "postgresql://postgres:mypassword@db:5432/optisaas?schema=public"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npx prisma studio --browser none"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata_fresh:
  minio_data:
