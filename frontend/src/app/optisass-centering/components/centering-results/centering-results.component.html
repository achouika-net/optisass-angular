<div *ngIf="result" class="results">
    <h3>Valider mesures</h3>
    <!-- Just showing JSON for debug, but you can format nicely -->
    <!-- <pre>{{ result | json }}</pre> -->
    <div class="summary">
        <p>Calculé: PD {{result.pd | number:'1.1-1'}} mm</p>
    </div>
    <div *ngIf="animationUrl">
        <video [src]="animationUrl" controls class="w-full"></video>
    </div>
    <button type="button" class="save-btn" (click)="onSave()">Utiliser ces mesures</button>
</div>
