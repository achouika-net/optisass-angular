<div class="container animate__animated animate__fadeIn">
  <!-- Header Section -->
  <div class="header-section">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <div>
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight flex items-center gap-3">
          <div class="p-2 bg-indigo-50 rounded-xl">
            <mat-icon class="text-indigo-600 block">percent</mat-icon>
          </div>
          Gestion des Commissions
        </h1>
        <p class="text-slate-500 mt-1">Configurez les taux par poste et par catégorie de produit en un coup d'œil.</p>
      </div>

      <div class="flex items-center gap-3">
        <button mat-stroked-button color="primary" class="premium-btn" (click)="loadRules()" [disabled]="loading">
          <mat-icon>refresh</mat-icon> Actualiser
        </button>
        <button mat-flat-button color="primary" class="premium-btn shadow-lg shadow-indigo-200" (click)="saveMatrix()" [disabled]="loading">
          <mat-icon>save</mat-icon> Enregistrer Tout
        </button>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="flex justify-center p-12">
    <div class="flex flex-col items-center gap-4">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
      <p class="text-slate-400 font-medium italic">Traitement en cours...</p>
    </div>
  </div>

  <!-- Matrix Grid -->
  <mat-card class="matrix-card shadow-sm border border-slate-200" *ngIf="!loading">
    <div class="overflow-x-hidden">
      <table class="matrix-table">
        <thead>
          <tr>
            <th class="role-cell text-left">Poste / Profil</th>
            <th *ngFor="let type of typesProduit">{{ type }}</th>
            <th style="width: 100px;">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let poste of postes">
            <td class="role-cell">
              <div class="flex items-center gap-2">
                <mat-icon class="text-slate-400 scale-75">work</mat-icon>
                {{ poste }}
              </div>
            </td>
            
            <td *ngFor="let type of typesProduit">
              <div class="rate-input-container">
                <input 
                  type="number" 
                  class="rate-input" 
                  [(ngModel)]="matrix[poste][type]"
                  [ngModelOptions]="{standalone: true}"
                  min="0"
                  max="100"
                  step="0.1"
                  #rateInput
                  [title]="'Taux pour ' + poste + ' / ' + type"
                >
                <span class="currency">%</span>
              </div>
            </td>

            <td>
              <div class="flex justify-center gap-1">
                <button mat-icon-button 
                        class="btn-apply-all text-indigo-600 hover:bg-indigo-50" 
                        [matTooltip]="'Appliquer le premier taux ( ' + matrix[poste][typesProduit[0]] + '% ) à TOUS les produits pour ce poste'"
                        (click)="applyToAllRow(poste, matrix[poste][typesProduit[0]])">
                  <mat-icon>auto_fix_high</mat-icon>
                </button>
                <button mat-icon-button 
                        class="btn-apply-all text-red-500 hover:bg-red-50" 
                        [matTooltip]="'Supprimer le profil ' + poste"
                        (click)="deletePoste(poste)">
                  <mat-icon>delete_outline</mat-icon>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </mat-card>

  <div class="actions-footer">
    <!-- Add New Role Action -->
    <div class="add-poste-container mr-auto">
        <input 
          type="text" 
          placeholder="Nouveau Profil (ex: STAGIAIRE)" 
          class="add-poste-input" 
          [(ngModel)]="newPosteName"
          [ngModelOptions]="{standalone: true}"
          (keyup.enter)="addPoste()"
        >
        <button mat-icon-button color="primary" (click)="addPoste()" [disabled]="!newPosteName?.trim()">
          <mat-icon>add_circle</mat-icon>
        </button>
    </div>

    <button mat-flat-button color="primary" class="premium-btn shadow-xl shadow-indigo-200 h-12 px-10" (click)="saveMatrix()" [disabled]="loading">
      <mat-icon>check_circle</mat-icon>
      <span class="ml-2">Valider toute la matrice</span>
    </button>
  </div>
</div>
