<div class="form-grid">
  <!-- Supplier autocomplete with add button -->
  <div class="flex items-start gap-2">
    <app-resource-autocomplete
      class="flex-1"
      [formField]="form.supplierId"
      [options]="supplierOptions()"
      [showAllOption]="false"
      [placeholder]="'stock.entry.supplier'"
      valueKey="id"
      labelKey="name"
      (selectionChange)="onSupplierChange($event)"
    />
    <button
      mat-icon-button
      type="button"
      class="mt-1"
      (click)="openNewSupplierDialog()"
      [matTooltip]="'stock.entry.newSupplier' | translate"
    >
      <mat-icon>add</mat-icon>
    </button>
  </div>

  <!-- Document type -->
  <div class="flex items-center">
    <mat-radio-group
      [value]="documentType()"
      (change)="onDocumentTypeChange($event)"
      class="flex gap-4"
    >
      <mat-radio-button value="invoice">
        {{ 'stock.entry.invoice' | translate }}
      </mat-radio-button>
      <mat-radio-button value="delivery_note">
        {{ 'stock.entry.deliveryNote' | translate }}
      </mat-radio-button>
    </mat-radio-group>
  </div>

  <!-- Document number -->
  <mat-form-field appFieldControlLabel>
    <mat-label>{{ 'stock.entry.documentNumber' | translate }}</mat-label>
    <input matInput [formField]="form.documentNumber" (blur)="onDocumentNumberChange()" />
  </mat-form-field>

  <!-- Document date -->
  <mat-form-field appFieldControlLabel>
    <mat-label>{{ 'stock.entry.documentDate' | translate }}</mat-label>
    <input
      matInput
      [matDatepicker]="picker"
      [formField]="form.documentDate"
      (dateChange)="onDocumentDateChange()"
    />
    <mat-datepicker-toggle matIconSuffix [for]="picker" />
    <mat-datepicker #picker />
  </mat-form-field>
</div>
